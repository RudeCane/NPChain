# ═══════════════════════════════════════════════════════════════════
#  NPChain Testnet Node Configuration
#  File: testnet.conf
# ═══════════════════════════════════════════════════════════════════

[network]
chain_id        = "TCR"
network         = "testnet"
listen_port     = 19333
max_peers       = 50
min_subnets     = 1

# Seed nodes (populated by deploy script)
seed_nodes = [
    "seed1.testnet.npchain.network:19333",
    "seed2.testnet.npchain.network:19333",
    "seed3.testnet.npchain.network:19333"
]

[consensus]
block_time_sec      = 15
difficulty_window   = 36
max_difficulty_adj  = 2.0
genesis_difficulty  = 1
committee_size      = 3
quorum              = 2
checkpoint_interval = 100

[mining]
enabled          = true
threads          = 0           # 0 = auto-detect (all cores)
portfolio_copies = 4
solver_timeout   = 120

[storage]
data_dir       = "/data/npchain/testnet"
prune          = false
db_cache_mb    = 512

[emission]
model              = "annual_cap"
annual_cap_certs   = 52500000
blocks_per_year    = 2102400
# Block reward ≈ 24.97 Certs at 15s blocks (52.5M / 2,102,400)

[privacy]
stealth_addresses  = true
confidential_tx    = true
zk_proofs          = true

[security]
anti_flood         = true
peer_scoring       = true
replay_guard       = true

[faucet]
enabled         = true
drip_amount_certs = 10000
cooldown_sec    = 3600
max_daily_drips = 100

[rpc]
enabled  = true
host     = "0.0.0.0"
port     = 18332
# API key set via environment variable NPCHAIN_RPC_KEY

[metrics]
enabled  = true
host     = "0.0.0.0"
port     = 9100
# Prometheus-compatible /metrics endpoint

[logging]
level    = "info"     # debug, info, warn, error
file     = "/data/npchain/testnet/node.log"
console  = true
max_size_mb = 100
max_files   = 5
