global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'seed_nodes'
    static_configs:
      - targets: ['172.31.0.10:9100', '172.31.0.11:9100', '172.31.0.12:9100']
        labels:
          role: 'seed'

  - job_name: 'miner'
    static_configs:
      - targets: ['172.31.0.20:9100']
        labels:
          role: 'miner'

  - job_name: 'faucet'
    static_configs:
      - targets: ['172.31.0.30:9100']
        labels:
          role: 'faucet'

  - job_name: 'explorer'
    static_configs:
      - targets: ['172.31.0.40:9100']
        labels:
          role: 'explorer'
