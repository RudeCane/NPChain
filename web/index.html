<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPChain Wallet</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root{--bg:#050608;--bg2:#0a0d12;--bg3:#0f1319;--bg4:#141920;--border:#1a1f2e;--border2:#252b3a;--text:#c8cdd8;--text2:#7a8194;--text3:#4a5068;--accent:#00e5a0;--accent2:#00b87d;--accentbg:#00e5a00a;--accentbr:#00e5a022;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;--purple:#8b5cf6;--r:10px;--r2:14px;--r3:20px}
*{margin:0;padding:0;box-sizing:border-box}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono','JetBrains Mono',monospace;min-height:100vh;display:flex;justify-content:center;-webkit-font-smoothing:antialiased}
#app{width:100%;max-width:520px;min-height:100vh;display:flex;flex-direction:column;border-left:1px solid var(--border);border-right:1px solid var(--border)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),#0088cc);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--bg);letter-spacing:1px;transform:rotate(-3deg)}
.logo-text{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:#e8ecf4;letter-spacing:-0.5px}
.top-right{display:flex;align-items:center;gap:10px}
.dot{width:7px;height:7px;border-radius:50%}
.dot.on{background:var(--accent);box-shadow:0 0 10px var(--accentbr)}
.dot.off{background:var(--red);box-shadow:0 0 10px #ef444433}
.badge{padding:3px 8px;border-radius:var(--r);font-size:9px;font-weight:600;letter-spacing:1.5px;border:1px solid var(--accentbr);color:var(--accent);background:var(--accentbg)}
.lock-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text3);padding:4px 10px;cursor:pointer;font-family:inherit;font-size:10px;transition:all .15s}
.lock-btn:hover{border-color:var(--border2);color:var(--text2)}
.main{flex:1;overflow-y:auto;padding-bottom:80px}
.center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px}
h1{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:#eef0f6;letter-spacing:-0.5px;margin-bottom:4px}
h2{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;color:#dde0ea;margin-bottom:12px}
.sub{font-size:12px;color:var(--text3);margin-bottom:28px;text-align:center;line-height:1.7}
.card{margin:12px 16px;padding:20px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.card.accent{border-color:var(--accentbr);background:linear-gradient(135deg,var(--bg3),#0a1a14)}
input,textarea,select{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:#e0e4f0;font-family:inherit;font-size:12px;outline:none;margin-bottom:10px;transition:border .2s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--text3)}
textarea{min-height:70px;resize:vertical}
select{appearance:none;cursor:pointer}
.btn{width:100%;padding:13px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--r);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.3px;transition:all .15s}
.btn:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-sm{padding:7px 14px;font-size:10px;width:auto;border-radius:6px}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text2);font-weight:500}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);background:transparent;transform:none}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{background:#dc2626}
.btn-green{background:var(--accent)}
.btn-amber{background:var(--amber);color:var(--bg)}
.btn-ghost{width:100%;padding:11px;background:transparent;color:var(--text3);border:1px solid var(--border);border-radius:var(--r);font-family:inherit;font-size:12px;cursor:pointer;transition:all .15s}
.btn-ghost:hover{border-color:var(--border2);color:var(--text2)}
.btn-danger{color:var(--red);border-color:#2a1a1a}
.btn-danger:hover{border-color:var(--red);color:var(--red)}
.copy-btn{padding:5px 12px;background:var(--bg4);color:var(--accent);border:1px solid var(--accentbr);border-radius:6px;font-family:inherit;font-size:10px;cursor:pointer;font-weight:600;transition:all .15s}
.copy-btn:hover{background:var(--bg3)}
.lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.val{font-size:12px;color:var(--text);word-break:break-all;line-height:1.6}
.val.mono{font-family:'IBM Plex Mono',monospace}
.val.green{color:var(--accent)}
.bal{font-family:'Space Grotesk',sans-serif;font-size:40px;font-weight:700;color:#eef0f6;letter-spacing:-2px}
.bal-unit{font-size:14px;color:var(--text3);margin-left:6px;font-weight:400;letter-spacing:0}
.stat-row{display:flex;justify-content:space-between;padding:7px 0;font-size:11px;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-row .k{color:var(--text3)}.stat-row .v{color:var(--text)}
.stat-row .v.hl{color:var(--accent)}
.err{padding:10px 14px;background:#1a0808;border:1px solid #ef444433;border-radius:var(--r);color:var(--red);font-size:11px;margin:0 16px 12px}
.suc{padding:10px 14px;background:#081a0e;border:1px solid var(--accentbr);border-radius:var(--r);color:var(--accent);font-size:11px;margin:0 16px 12px}
.cmd-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px 40px 12px 12px;font-size:11px;color:var(--accent);word-break:break-all;line-height:1.6;position:relative;margin:8px 0}
.cmd-box .cp{position:absolute;top:6px;right:6px;padding:3px 8px;background:var(--bg3);border-radius:4px;cursor:pointer;font-size:9px;color:var(--text3);border:none;font-family:inherit}
.cmd-box .cp:hover{color:var(--accent)}
.steps{padding:14px;background:#1a1400;border:1px solid #f59e0b22;border-radius:var(--r);font-size:11px;color:var(--amber);line-height:2}
.step-n{display:inline-flex;width:20px;height:20px;background:var(--amber);color:var(--bg);border-radius:50%;align-items:center;justify-content:center;font-weight:700;font-size:10px;margin-right:6px}
.block-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:11px;border-bottom:1px solid var(--border)}
.block-row:last-child{border-bottom:none}
.block-n{color:var(--accent);font-weight:600;min-width:50px}
.block-m{color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin:0 8px}
.block-m.you{color:var(--accent)}
.block-r{color:var(--text3);font-size:10px}
/* Bottom nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;display:flex;background:var(--bg2);border-top:1px solid var(--border);z-index:20}
.nav-btn{flex:1;padding:10px 4px 8px;text-align:center;cursor:pointer;border:none;background:none;font-family:inherit;font-size:9px;color:var(--text3);letter-spacing:.5px;transition:color .15s;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn.active{color:var(--accent)}
.nav-btn:hover{color:var(--text)}
.nav-icon{font-size:16px;line-height:1}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);display:none}
.nav-btn.active .nav-dot{display:block}
/* Proposal cards */
.prop{margin:0 16px 10px;padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2)}
.prop-title{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:#dde0ea;margin:6px 0}
.prop-desc{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.prop-meta{display:flex;gap:10px;font-size:9px;color:var(--text3);flex-wrap:wrap;margin-bottom:6px}
.prop-meta span{color:var(--text2)}
.sbadge{display:inline-block;padding:2px 7px;border-radius:8px;font-size:8px;font-weight:700;letter-spacing:.5px}
.sb-active{background:var(--accentbr);color:var(--accent)}
.sb-passed{background:#3b82f622;color:var(--blue)}
.sb-rejected{background:#ef444422;color:var(--red)}
.sb-completed{background:var(--accentbr);color:var(--accent)}
.sb-expired{background:#4a506822;color:var(--text3)}
.vbar{height:16px;background:var(--bg);border-radius:8px;overflow:hidden;display:flex;margin:4px 0}
.vbar .ap{background:var(--accent);transition:width .3s}
.vbar .rj{background:var(--red);transition:width .3s}
.vbar .ab{background:var(--text3);transition:width .3s}
.vote-row{display:flex;justify-content:space-between;font-size:9px;margin-bottom:2px}
.vote-btns{display:flex;gap:4px;margin-top:8px}
.vote-btns button{flex:1;border-radius:6px}
/* Job cards */
.job{margin:0 16px 10px;padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2)}
.job-title{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:#dde0ea;margin:4px 0}
.job-bounty{font-size:18px;font-weight:700;color:var(--accent);font-family:'Space Grotesk',sans-serif}
.empty{text-align:center;padding:40px 16px;color:var(--text3);font-size:12px}
.fadein{animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.subtab-bar{display:flex;gap:4px;padding:10px 16px}
.subtab{padding:7px 14px;border-radius:var(--r);font-size:10px;font-weight:600;cursor:pointer;border:1px solid transparent;font-family:inherit;background:var(--bg4);color:var(--text3);transition:all .15s}
.subtab.active{background:var(--accentbg);border-color:var(--accentbr);color:var(--accent)}
.subtab:hover{color:var(--text2)}
.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.config-grid .k{font-size:11px;color:var(--text3);padding:4px 0}
.config-grid .v{font-size:11px;color:var(--accent);text-align:right;padding:4px 0}
</style>
</head>
<body>
<div id="app"></div>
<script>

// ═══ SHA3-256 ═══
var RC=[0x0000000000000001n,0x0000000000008082n,0x800000000000808an,0x8000000080008000n,0x000000000000808bn,0x0000000080000001n,0x8000000080008081n,0x8000000000008009n,0x000000000000008an,0x0000000000000088n,0x0000000080008009n,0x000000008000000an,0x000000008000808bn,0x800000000000008bn,0x8000000000008089n,0x8000000000008003n,0x8000000000008002n,0x8000000000000080n,0x000000000000800an,0x800000008000000an,0x8000000080008081n,0x8000000000008080n,0x0000000080000001n,0x8000000080008008n];
var ROT=[[0,1,62,28,27],[36,44,6,55,20],[3,10,43,25,39],[41,45,15,21,8],[18,2,61,56,14]];
var Mk=(1n<<64n)-1n;
function rl(x,n){return((x<<BigInt(n))|(x>>BigInt(64-n)))&Mk}
function kf(s){for(var r=0;r<24;r++){var C=[],D=[],B=[];for(var x=0;x<5;x++)C[x]=s[x]^s[x+5]^s[x+10]^s[x+15]^s[x+20];for(x=0;x<5;x++)D[x]=C[(x+4)%5]^rl(C[(x+1)%5],1);for(var i=0;i<25;i++)s[i]=(s[i]^D[i%5])&Mk;for(x=0;x<5;x++)for(var y=0;y<5;y++)B[y+5*((2*x+3*y)%5)]=rl(s[x+5*y],ROT[y][x]);for(x=0;x<5;x++)for(y=0;y<5;y++)s[x+5*y]=(B[x+5*y]^((~B[(x+1)%5+5*y]&Mk)&B[(x+2)%5+5*y]))&Mk;s[0]=(s[0]^RC[r])&Mk}}
function sha3(data){var rate=136,st=Array(25).fill(0n);var b=typeof data==='string'?new TextEncoder().encode(data):new Uint8Array(data);var p=0;for(var i=0;i<b.length;i++){st[p>>3]=(st[p>>3]^(BigInt(b[i])<<BigInt((p%8)*8)))&Mk;p++;if(p===rate){kf(st);p=0}}st[p>>3]=(st[p>>3]^(0x06n<<BigInt((p%8)*8)))&Mk;st[(rate-1)>>3]=(st[(rate-1)>>3]^(0x80n<<BigInt(((rate-1)%8)*8)))&Mk;kf(st);var o=new Uint8Array(32);for(i=0;i<32;i++)o[i]=Number((st[i>>3]>>BigInt((i%8)*8))&0xFFn);return o}
function toHex(b){return Array.from(b).map(function(x){return x.toString(16).padStart(2,'0')}).join('')}
function genKeypair(){var sk=crypto.getRandomValues(new Uint8Array(64));var pk=sha3(sk);return{pk:pk,sk:sk}}
function deriveAddr(pk){return'cert1'+toHex(sha3(pk)).substring(0,40)}
function deriveKey(pw,salt){var pb=new TextEncoder().encode(pw);var c=new Uint8Array(pb.length+salt.length);c.set(pb);c.set(salt,pb.length);var k=sha3(c);for(var i=0;i<5000;i++){var r=new Uint8Array(36);r.set(k);r[32]=i&0xff;r[33]=(i>>8)&0xff;r[34]=(i>>16)&0xff;r[35]=(i>>24)&0xff;k=sha3(r)}return k}
function encryptKey(sk,pw){var salt=crypto.getRandomValues(new Uint8Array(16));var key=deriveKey(pw,salt);var stream=sha3(key);var enc=new Uint8Array(sk.length);for(var i=0;i<sk.length;i++)enc[i]=sk[i]^stream[i%32];var check=sha3(key);return{salt:toHex(salt),enc:toHex(enc),check:toHex(check)}}
function decryptKey(data,pw){var salt=new Uint8Array(data.salt.match(/.{2}/g).map(function(b){return parseInt(b,16)}));var key=deriveKey(pw,salt);if(toHex(sha3(key))!==data.check)return null;return true}

// ═══ State ═══
var LS={save:function(k,v){try{localStorage.setItem('npc4_'+k,JSON.stringify(v))}catch(e){}},load:function(k){try{var v=localStorage.getItem('npc4_'+k);return v?JSON.parse(v):null}catch(e){return null}},del:function(k){try{localStorage.removeItem('npc4_'+k)}catch(e){}}};
var RPC='http://localhost:18333';
var W=null,unlocked=false,pw1='',pw2='',pwu='',err='',suc='',justCreated=false;
var copied=false,cmdCopied=false;
var tab='wallet',govSub='proposals',mktSub='browse';
var on=false,bal='0.0000',ht=0,diff=0,supply='0',tip='',mined=0,blocks=[];
var props=[],gcfg={},jobs=[],mktStats={};
var gF={type:'general',title:'',desc:'',pk:'',pv:''};
var jF={type:'routing',title:'',desc:'',size:'',bounty:'',opt:'minimize_distance',deadline:'240'};
var pollT=null;

function fetchAll(){
  if(!W||!unlocked)return;
  var a=W.address;
  fetch(RPC+'/api/v1/balance/'+a).then(function(r){return r.json()}).then(function(d){bal=(d.balance||0).toFixed(4);on=true;render()}).catch(function(){on=false;render()});
  fetch(RPC+'/api/v1/status').then(function(r){return r.json()}).then(function(d){ht=d.height||0;diff=d.difficulty||0;supply=(d.total_supply||0).toFixed(2);tip=d.tip_hash||'';on=true;render()}).catch(function(){});
  fetch(RPC+'/api/v1/blocks').then(function(r){return r.json()}).then(function(d){blocks=d.blocks||[];render()}).catch(function(){});
  fetch(RPC+'/api/v1/miner').then(function(r){return r.json()}).then(function(d){mined=d.blocks_mined||0;render()}).catch(function(){});
  fetch(RPC+'/api/v1/governance/proposals').then(function(r){return r.json()}).then(function(d){props=d.proposals||[];render()}).catch(function(){});
  fetch(RPC+'/api/v1/governance/config').then(function(r){return r.json()}).then(function(d){gcfg=d;render()}).catch(function(){});
  fetch(RPC+'/api/v1/marketplace/jobs').then(function(r){return r.json()}).then(function(d){jobs=d.jobs||[];render()}).catch(function(){});
  fetch(RPC+'/api/v1/marketplace/stats').then(function(r){return r.json()}).then(function(d){mktStats=d;render()}).catch(function(){});
}
function startPoll(){if(pollT)clearInterval(pollT);fetchAll();pollT=setInterval(fetchAll,4000)}
function stopPoll(){if(pollT){clearInterval(pollT);pollT=null}}

function h(t,p){var el=document.createElement(t);var ch=Array.prototype.slice.call(arguments,2);if(p)Object.keys(p).forEach(function(k){if(k.indexOf('on')===0)el[k]=p[k];else if(k==='className')el.className=p[k];else if(k==='style'&&typeof p[k]==='object')Object.assign(el.style,p[k]);else el.setAttribute(k,p[k])});ch.forEach(function(c){if(Array.isArray(c))c.forEach(function(cc){if(cc!=null&&cc!==false)el.append(typeof cc==='string'||typeof cc==='number'?document.createTextNode(String(cc)):cc)});else if(c!=null&&c!==false)el.append(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c)});return el}
function cp(text,f){navigator.clipboard&&navigator.clipboard.writeText(text);if(f==='a')copied=true;else cmdCopied=true;render();setTimeout(function(){copied=false;cmdCopied=false;render()},2000)}

function govVote(pid,choice){
  if(!W)return;
  fetch(RPC+'/api/v1/governance/vote',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({proposal_id:pid,voter:W.address,choice:choice})}).then(function(r){return r.json()}).then(function(d){if(d.ok){suc='Vote: '+choice;fetchAll()}else err=d.error||'Failed';render();setTimeout(function(){suc='';err='';render()},4000)}).catch(function(){err='Network error';render()});
}
function govSubmit(){
  if(!W||!gF.title||!gF.desc){err='Fill all fields';render();return}
  fetch(RPC+'/api/v1/governance/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({author:W.address,type:gF.type,title:gF.title,description:gF.desc,param_key:gF.pk,param_value:gF.pv})}).then(function(r){return r.json()}).then(function(d){if(d.ok){suc='Proposal #'+d.proposal_id+' submitted!';gF={type:'general',title:'',desc:'',pk:'',pv:''};govSub='proposals';fetchAll()}else err=d.error||'Failed';render();setTimeout(function(){suc='';err='';render()},4000)}).catch(function(){err='Network error';render()});
}
function mktSubmit(){
  if(!W||!jF.title){err='Fill all fields';render();return}
  fetch(RPC+'/api/v1/marketplace/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({submitter:W.address,type:jF.type,title:jF.title,description:jF.desc,problem_size:parseInt(jF.size)||0,bounty:parseFloat(jF.bounty)||0,optimize:jF.opt,deadline_blocks:parseInt(jF.deadline)||240})}).then(function(r){return r.json()}).then(function(d){if(d.ok){suc='Job #'+d.job_id+' posted!';jF={type:'routing',title:'',desc:'',size:'',bounty:'',opt:'minimize_distance',deadline:'240'};mktSub='browse';fetchAll()}else err=d.error||'Failed';render();setTimeout(function(){suc='';err='';render()},4000)}).catch(function(){err='Network error';render()});
}

function render(){
  var app=document.getElementById('app');app.innerHTML='';
  // Topbar
  var lb=W&&unlocked?h('button',{className:'lock-btn',onclick:function(){unlocked=false;stopPoll();on=false;bal='0.0000';render()}},'Lock'):null;
  app.append(h('div',{className:'topbar'},h('div',{className:'logo'},h('div',{className:'logo-mark'},'NP'),h('div',{className:'logo-text'},'NPChain')),h('div',{className:'top-right'},h('span',{className:'dot '+(on?'on':'off')}),h('span',{className:'badge'},'TESTNET'),lb)));
  var main=h('div',{className:'main'});app.append(main);

  // ═══ CREATE ═══
