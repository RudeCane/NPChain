<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPChain Wallet</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1a2035;border-radius:3px}
body{background:#06080c;color:#c0c8d8;font-family:'JetBrains Mono','Fira Code',monospace;min-height:100vh;display:flex;justify-content:center}
#app{width:100%;max-width:460px;min-height:100vh;display:flex;flex-direction:column;border-left:1px solid #141a2a;border-right:1px solid #141a2a;position:relative;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #141a2a;background:#080b12}
.logo{display:flex;align-items:center;gap:10px}
.hex{width:30px;height:30px;background:linear-gradient(135deg,#00e5a0,#0088cc);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#06080c}
.hex.lg{width:56px;height:56px;font-size:18px}
.logo-text{font-size:14px;font-weight:600;color:#e0e4f0}
.net-badge{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:1px;border:1px solid #00e5a033;color:#00e5a0;background:#00e5a00a}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.status-dot.online{background:#00e5a0;box-shadow:0 0 8px #00e5a066}
.status-dot.offline{background:#ff4444;box-shadow:0 0 8px #ff444466}
.main{flex:1;overflow-y:auto;padding-bottom:20px}
.screen-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
.title{font-family:'Inter',sans-serif;font-size:22px;font-weight:700;color:#e8ecf4;margin-bottom:6px}
.subtitle{font-size:12px;color:#4a5470;margin-bottom:30px;text-align:center;line-height:1.6}
.card{margin:0 16px 12px;padding:20px;background:#0c1018;border:1px solid #141a2a;border-radius:12px}
input[type=password]{width:100%;padding:12px 14px;background:#0a0e16;border:1px solid #1a2035;border-radius:8px;color:#e0e4f0;font-family:inherit;font-size:13px;outline:none;margin-bottom:10px;transition:border .2s}
input:focus{border-color:#00e5a0}
input::placeholder{color:#2a3050}
.btn{width:100%;padding:14px;background:#00e5a0;color:#06080c;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn-ghost{width:100%;padding:12px;background:transparent;color:#5a6480;border:1px solid #1a2035;border-radius:8px;font-family:inherit;font-size:13px;cursor:pointer;text-align:center;margin-top:8px}
.btn-ghost:hover{border-color:#2a3050;color:#8a90a0}
.btn-danger{color:#ff6b6b;border-color:#2a1a1a}
.btn-danger:hover{border-color:#ff6b6b44}
.btn-copy{padding:8px 16px;background:#141a2a;color:#00e5a0;border:1px solid #00e5a033;border-radius:6px;font-family:inherit;font-size:11px;cursor:pointer;font-weight:600}
.btn-copy:hover{background:#1a2535}
.lock-btn{background:none;border:1px solid #1a2035;border-radius:6px;color:#5a6480;padding:5px 10px;cursor:pointer;font-family:inherit;font-size:11px}
.lock-btn:hover{border-color:#3a4060;color:#8a90a0}
.label{font-size:10px;color:#4a5470;margin-bottom:6px;text-transform:uppercase;letter-spacing:1.5px}
.addr-box{font-size:12px;color:#8a90a0;word-break:break-all;line-height:1.6;background:#0a0e16;padding:12px;border-radius:8px;border:1px solid #1a2035;margin:8px 0}
.bal-amount{font-family:'Inter',sans-serif;font-size:36px;font-weight:700;color:#e8ecf4;letter-spacing:-1px}
.bal-sym{font-size:14px;color:#5a6480;margin-left:8px;font-weight:500}
.detail{font-size:11px;color:#5a6480;line-height:2.2}
.detail span{color:#8a90a0}
.detail .hl{color:#00e5a0}
.mine-cmd{background:#0a0e16;border:1px solid #1a2035;border-radius:8px;padding:12px;font-size:11px;color:#00e5a0;word-break:break-all;line-height:1.6;margin:10px 0;position:relative}
.mine-cmd .cbtn{position:absolute;top:4px;right:4px;padding:4px 8px;background:#141a2a;border-radius:4px;cursor:pointer;font-size:10px;color:#5a6480;border:none;font-family:inherit}
.mine-cmd .cbtn:hover{color:#00e5a0}
.block-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #0f1420;font-size:11px}
.block-row:last-child{border-bottom:none}
.block-num{color:#00e5a0;font-weight:600}
.block-miner{color:#5a6480;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.block-miner.you{color:#00e5a0}
.error{padding:10px 14px;background:#2a0a0a;border:1px solid #ff4444;border-radius:8px;color:#ff6666;font-size:12px;margin-bottom:12px}
.fadein{animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.warning-box{margin:16px 0;padding:14px;background:#2a1a00;border:1px solid #f59e0b44;border-radius:8px;font-size:12px;color:#f59e0b;line-height:1.8}
.step-num{display:inline-block;width:22px;height:22px;background:#f59e0b;color:#06080c;border-radius:50%;text-align:center;line-height:22px;font-weight:700;font-size:11px;margin-right:6px}
</style>
</head>
<body>
<div id="app"></div>
<script>

// ═══════════════════════════════════════════════════════════════
//  SHA3-256 — matches NPChain hashing
// ═══════════════════════════════════════════════════════════════
var RC=[0x0000000000000001n,0x0000000000008082n,0x800000000000808an,0x8000000080008000n,0x000000000000808bn,0x0000000080000001n,0x8000000080008081n,0x8000000000008009n,0x000000000000008an,0x0000000000000088n,0x0000000080008009n,0x000000008000000an,0x000000008000808bn,0x800000000000008bn,0x8000000000008089n,0x8000000000008003n,0x8000000000008002n,0x8000000000000080n,0x000000000000800an,0x800000008000000an,0x8000000080008081n,0x8000000000008080n,0x0000000080000001n,0x8000000080008008n];
var ROT=[[0,1,62,28,27],[36,44,6,55,20],[3,10,43,25,39],[41,45,15,21,8],[18,2,61,56,14]];
var Mk=(1n<<64n)-1n;
function rl(x,n){return((x<<BigInt(n))|(x>>BigInt(64-n)))&Mk}
function kf(s){for(var r=0;r<24;r++){var C=[],D=[],B=[];for(var x=0;x<5;x++)C[x]=s[x]^s[x+5]^s[x+10]^s[x+15]^s[x+20];for(x=0;x<5;x++)D[x]=C[(x+4)%5]^rl(C[(x+1)%5],1);for(var i=0;i<25;i++)s[i]=(s[i]^D[i%5])&Mk;for(x=0;x<5;x++)for(var y=0;y<5;y++)B[y+5*((2*x+3*y)%5)]=rl(s[x+5*y],ROT[y][x]);for(x=0;x<5;x++)for(y=0;y<5;y++)s[x+5*y]=(B[x+5*y]^((~B[(x+1)%5+5*y]&Mk)&B[(x+2)%5+5*y]))&Mk;s[0]=(s[0]^RC[r])&Mk}}
function sha3(data){var rate=136,st=Array(25).fill(0n);var b=typeof data==='string'?new TextEncoder().encode(data):new Uint8Array(data);var p=0;for(var i=0;i<b.length;i++){st[p>>3]=(st[p>>3]^(BigInt(b[i])<<BigInt((p%8)*8)))&Mk;p++;if(p===rate){kf(st);p=0}}st[p>>3]=(st[p>>3]^(0x06n<<BigInt((p%8)*8)))&Mk;st[(rate-1)>>3]=(st[(rate-1)>>3]^(0x80n<<BigInt(((rate-1)%8)*8)))&Mk;kf(st);var o=new Uint8Array(32);for(i=0;i<32;i++)o[i]=Number((st[i>>3]>>BigInt((i%8)*8))&0xFFn);return o}
function toHex(b){return Array.from(b).map(function(x){return x.toString(16).padStart(2,'0')}).join('')}

// ═══════════════════════════════════════════════════════════════
//  Crypto: keypair, encryption, address
// ═══════════════════════════════════════════════════════════════
function genKeypair(){var sk=crypto.getRandomValues(new Uint8Array(64));var pk=sha3(sk);return{pk:pk,sk:sk}}
function deriveAddr(pk){return'cert1'+toHex(sha3(pk)).substring(0,40)}
function deriveKey(pw,salt){var pb=new TextEncoder().encode(pw);var c=new Uint8Array(pb.length+salt.length);c.set(pb);c.set(salt,pb.length);var k=sha3(c);for(var i=0;i<5000;i++){var r=new Uint8Array(36);r.set(k);r[32]=i&0xff;r[33]=(i>>8)&0xff;r[34]=(i>>16)&0xff;r[35]=(i>>24)&0xff;k=sha3(r)}return k}
function encryptKey(sk,pw){var salt=crypto.getRandomValues(new Uint8Array(16));var key=deriveKey(pw,salt);var stream=sha3(key);var enc=new Uint8Array(sk.length);for(var i=0;i<sk.length;i++)enc[i]=sk[i]^stream[i%32];var check=sha3(key);return{salt:toHex(salt),enc:toHex(enc),check:toHex(check)}}
function decryptKey(data,pw){var salt=new Uint8Array(data.salt.match(/.{2}/g).map(function(b){return parseInt(b,16)}));var key=deriveKey(pw,salt);if(toHex(sha3(key))!==data.check)return null;var eb=new Uint8Array(data.enc.match(/.{2}/g).map(function(b){return parseInt(b,16)}));var stream=sha3(key);var sk=new Uint8Array(eb.length);for(var i=0;i<eb.length;i++)sk[i]=eb[i]^stream[i%32];return sk}

// ═══════════════════════════════════════════════════════════════
//  Storage
// ═══════════════════════════════════════════════════════════════
var LS={
  save:function(k,v){try{localStorage.setItem('npc3_'+k,JSON.stringify(v))}catch(e){}},
  load:function(k){try{var v=localStorage.getItem('npc3_'+k);return v?JSON.parse(v):null}catch(e){return null}},
  del:function(k){try{localStorage.removeItem('npc3_'+k)}catch(e){}}
};

var RPC='http://localhost:18333';
var wallet=null; // {address, pk, encrypted, created}
var unlocked=false;
var pw1='',pw2='',pwu='',err='';
var copied=false,cmdCopied=false,justCreated=false;
var online=false,balance='0.0000',chainHeight=0,chainDiff=0,chainSupply='0',chainTip='',blocksMined=0,recentBlocks=[];
var pollTimer=null;

function fetchData(){
  if(!wallet||!unlocked)return;
  fetch(RPC+'/api/v1/balance/'+wallet.address).then(function(r){return r.json()}).then(function(d){balance=(d.balance||0).toFixed(4);online=true;render()}).catch(function(){online=false;render()});
  fetch(RPC+'/api/v1/status').then(function(r){return r.json()}).then(function(d){chainHeight=d.height||0;chainDiff=d.difficulty||0;chainSupply=(d.total_supply||0).toFixed(2);chainTip=d.tip_hash||'';online=true;render()}).catch(function(){});
  fetch(RPC+'/api/v1/blocks').then(function(r){return r.json()}).then(function(d){recentBlocks=d.blocks||[];render()}).catch(function(){});
  fetch(RPC+'/api/v1/miner').then(function(r){return r.json()}).then(function(d){blocksMined=d.blocks_mined||0;render()}).catch(function(){});
}
function startPolling(){if(pollTimer)clearInterval(pollTimer);fetchData();pollTimer=setInterval(fetchData,3000)}
function stopPolling(){if(pollTimer){clearInterval(pollTimer);pollTimer=null}}

function h(tag,props){var el=document.createElement(tag);var ch=Array.prototype.slice.call(arguments,2);if(props)Object.keys(props).forEach(function(k){if(k.indexOf('on')===0)el[k]=props[k];else if(k==='className')el.className=props[k];else if(k==='style'&&typeof props[k]==='object')Object.assign(el.style,props[k]);else el.setAttribute(k,props[k])});ch.forEach(function(c){if(Array.isArray(c))c.forEach(function(cc){if(cc!=null)el.append(typeof cc==='string'||typeof cc==='number'?document.createTextNode(String(cc)):cc)});else if(c!=null&&c!==false)el.append(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c)});return el}

function copyText(text,which){navigator.clipboard&&navigator.clipboard.writeText(text);if(which==='addr')copied=true;else cmdCopied=true;render();setTimeout(function(){copied=false;cmdCopied=false;render()},2000)}

function render(){
  var app=document.getElementById('app');
  app.innerHTML='';

  // Topbar
  var lockBtn=null;
  if(wallet&&unlocked){
    lockBtn=h('button',{className:'lock-btn',onclick:function(){unlocked=false;stopPolling();online=false;balance='0.0000';render()}},'Lock');
  }
  app.append(h('div',{className:'topbar'},
    h('div',{className:'logo'},h('div',{className:'hex'},'NP'),h('div',{className:'logo-text'},'NPChain')),
    h('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},
      h('span',{className:'status-dot '+(online?'online':'offline')}),
      h('span',{className:'net-badge'},'TESTNET'),
      lockBtn
    )
  ));

  var main=h('div',{className:'main'});
  app.append(main);

  // ─── WELCOME: CREATE WALLET ───
  if(!wallet){
    main.append(h('div',{className:'screen-center fadein'},
      h('div',{className:'hex lg',style:{marginBottom:'20px'}},'NP'),
      h('div',{className:'title'},'NPChain Wallet'),
      h('div',{className:'subtitle'},'Create a password-protected wallet.',h('br'),'You need this address to start mining.'),
      h('div',{style:{width:'100%',maxWidth:'340px'}},
        err?h('div',{className:'error'},err):null,
        h('input',{type:'password',placeholder:'Create password (8+ characters)',oninput:function(e){pw1=e.target.value}}),
        h('input',{type:'password',placeholder:'Confirm password',oninput:function(e){pw2=e.target.value},onkeydown:function(e){if(e.key==='Enter')doCreate()}}),
        h('button',{className:'btn',onclick:doCreate},'Create Wallet'),
        h('div',{style:{height:'12px'}}),
        h('div',{style:{fontSize:'11px',color:'#3a4060',textAlign:'center',lineHeight:'1.8'}},
          'Your keys are encrypted with your password.',h('br'),'Nothing leaves your browser. Keep your password safe.'
        )
      )
    ));
    return;
  }

  // ─── UNLOCK ───
  if(!unlocked&&!justCreated){
    main.append(h('div',{className:'screen-center fadein'},
      h('div',{className:'hex lg',style:{marginBottom:'20px'}},'NP'),
      h('div',{className:'title'},'Welcome Back'),
      h('div',{style:{fontSize:'12px',color:'#5a6480',marginBottom:'30px',textAlign:'center',wordBreak:'break-all'}},wallet.address),
      h('div',{style:{width:'100%',maxWidth:'340px'}},
        err?h('div',{className:'error'},err):null,
        h('input',{type:'password',placeholder:'Enter password',autofocus:'true',oninput:function(e){pwu=e.target.value},onkeydown:function(e){if(e.key==='Enter')doUnlock()}}),
        h('button',{className:'btn',onclick:doUnlock,style:{marginBottom:'10px'}},'Unlock'),
        h('button',{className:'btn-ghost btn-danger',onclick:doDelete},'Delete Wallet')
      )
    ));
    return;
  }

  // ─── JUST CREATED: SHOW ADDRESS + MINING INSTRUCTIONS ───
  if(justCreated){
    var cmd='./npchain_testnet.exe --address '+wallet.address;
    main.append(h('div',{className:'screen-center fadein'},
      h('div',{className:'title',style:{color:'#00e5a0',marginBottom:'20px'}},'Wallet Created!'),
      h('div',{style:{width:'100%',maxWidth:'380px'}},
        h('div',{className:'label'},'YOUR MINING ADDRESS'),
        h('div',{className:'addr-box'},wallet.address),
        h('div',{style:{textAlign:'center',margin:'10px 0'}},
          h('button',{className:'btn-copy',onclick:function(){copyText(wallet.address,'addr')}},copied?'Copied!':'Copy Address')
        ),
        h('div',{className:'warning-box'},
          h('span',{className:'step-num'},'1'),' Copy your address above',h('br'),
          h('span',{className:'step-num'},'2'),' Open MSYS2 UCRT64 terminal',h('br'),
          h('span',{className:'step-num'},'3'),' Paste the mining command below',h('br'),
          h('span',{className:'step-num'},'4'),' Come back here to see your balance'
        ),
        h('div',{className:'label',style:{marginTop:'16px'}},'MINING COMMAND'),
        h('div',{className:'mine-cmd'},cmd,
          h('button',{className:'cbtn',onclick:function(){copyText(cmd,'cmd')}},cmdCopied?'Copied!':'Copy')
        ),
        h('div',{style:{marginTop:'6px',fontSize:'11px',color:'#4a5470',lineHeight:'1.6'}},
          'To join the public testnet, add: --seed SEED_IP:19333'
        ),
        h('button',{className:'btn',style:{marginTop:'20px'},onclick:function(){
          justCreated=false;
          startPolling();
          render();
        }},'Go to Dashboard')
      )
    ));
    return;
  }

  // ─── DASHBOARD ───
  main.append(h('div',{className:'card',style:{textAlign:'center',paddingTop:'28px',paddingBottom:'28px'}},
    h('div',{className:'label'},'BALANCE'),
    h('div',{style:{marginTop:'8px'}},
      h('span',{className:'bal-amount'},balance),
      h('span',{className:'bal-sym'},'CERTS')
    ),
    h('div',{style:{marginTop:'12px',fontSize:'11px',color:online?'#00e5a0':'#ff6b6b'}},
      online?'Node connected':'Node offline \u2014 start mining to see balance'
    )
  ));

  // Address
  main.append(h('div',{className:'card'},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}},
      h('div',{className:'label',style:{marginBottom:'0'}},'YOUR ADDRESS'),
      h('button',{className:'btn-copy',onclick:function(){copyText(wallet.address,'addr')}},copied?'Copied!':'Copy')
    ),
    h('div',{style:{fontSize:'12px',color:'#8a90a0',wordBreak:'break-all',lineHeight:'1.6'}},wallet.address)
  ));

  // Mining command
  var cmd='./npchain_testnet.exe --address '+wallet.address;
  main.append(h('div',{className:'card'},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}},
      h('div',{className:'label',style:{marginBottom:'0'}},'MINING COMMAND'),
      h('button',{className:'btn-copy',onclick:function(){copyText(cmd,'cmd')}},cmdCopied?'Copied!':'Copy')
    ),
    h('div',{style:{fontSize:'11px',color:'#00e5a0',wordBreak:'break-all',lineHeight:'1.6'}},cmd)
  ));

  // Chain stats
  if(online){
    main.append(h('div',{className:'card'},
      h('div',{className:'label',style:{marginBottom:'12px'}},'CHAIN STATUS'),
      h('div',{className:'detail'},
        'Height: ',h('span',{},String(chainHeight)),h('br'),
        'Difficulty: ',h('span',{},String(chainDiff)),h('br'),
        'Total Supply: ',h('span',{},chainSupply+' Certs'),h('br'),
        'Blocks You Mined: ',h('span',{className:'hl'},String(blocksMined)),h('br'),
        'Tip: ',h('span',{},chainTip?(chainTip.substring(0,24)+'...'):'')
      )
    ));
  }

  // Recent blocks
  if(recentBlocks.length>0){
    var rows=recentBlocks.slice(0,15).map(function(b){
      return h('div',{className:'block-row'},
        h('span',{className:'block-num'},'#'+b.height),
        h('span',{className:'block-miner'+(b.miner===wallet.address?' you':'')},
          b.miner===wallet.address?'You mined!':(b.miner||'').substring(0,20)+'...'
        ),
        h('span',{style:{color:'#4a5470',fontSize:'10px'}},(b.reward/1000000).toFixed(0)+' Certs')
      );
    });
    main.append(h('div',{className:'card'},
      h('div',{className:'label',style:{marginBottom:'12px'}},'RECENT BLOCKS'),
      rows
    ));
  }

  // Navigation links
  main.append(h('div',{style:{display:'flex',gap:'8px',padding:'0 16px',marginBottom:'12px'}},
    h('a',{href:'governance.html',style:{flex:'1',padding:'12px',background:'#141a2a',border:'1px solid #1a2035',borderRadius:'8px',color:'#00e5a0',textDecoration:'none',textAlign:'center',fontSize:'12px',fontWeight:'600',fontFamily:'inherit'}},'Governance & Voting'),
    h('a',{href:'explorer.html',style:{flex:'1',padding:'12px',background:'#141a2a',border:'1px solid #1a2035',borderRadius:'8px',color:'#5a6480',textDecoration:'none',textAlign:'center',fontSize:'12px',fontWeight:'600',fontFamily:'inherit'}},'Block Explorer')
  ));

  // Delete wallet
  main.append(h('div',{style:{padding:'20px 16px'}},
    h('button',{className:'btn-ghost btn-danger',onclick:doDelete},'Delete Wallet')
  ));
}

// ─── Actions ───
function doCreate(){
  err='';
  if(pw1.length<8){err='Password must be at least 8 characters';render();return}
  if(pw1!==pw2){err='Passwords do not match';render();return}
  var kp=genKeypair();
  var addr=deriveAddr(kp.pk);
  var encrypted=encryptKey(kp.sk,pw1);
  wallet={address:addr,pk:toHex(kp.pk),encrypted:encrypted,created:Date.now()};
  LS.save('wallet',wallet);
  unlocked=true;
  justCreated=true;
  pw1='';pw2='';err='';
  render();
}

function doUnlock(){
  err='';
  var result=decryptKey(wallet.encrypted,pwu);
  if(!result){err='Wrong password';render();setTimeout(function(){err='';render()},3000);return}
  unlocked=true;
  pwu='';err='';
  startPolling();
  render();
}

function doDelete(){
  if(!confirm('DELETE WALLET?\n\nThis permanently erases your keys.\nYou will need to create a new address to mine.\nMake sure you have backed up your address.'))return;
  LS.del('wallet');
  wallet=null;unlocked=false;justCreated=false;
  stopPolling();
  online=false;balance='0.0000';chainHeight=0;blocksMined=0;recentBlocks=[];
  pw1='';pw2='';pwu='';err='';
  render();
}

// ─── Init ───
wallet=LS.load('wallet');
if(wallet){unlocked=false;justCreated=false}
render();

</script>
</body>
</html>
